<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fly for New Pride 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--s1:#0d1117;--s2:#161b22;--border:#21262d;
  --text:#e6edf3;--text2:#8b949e;
  --cyan:#39d0ff;--green:#3fb950;--purple:#bc8cff;--orange:#ffa657;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Courier New',monospace;-webkit-tap-highlight-color:transparent}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 20px}

#wrap{width:100%;max-width:440px}

.brand{text-align:center;margin-bottom:48px}
.logo svg{width:42px;height:42px;margin-bottom:20px}
.brand h1{font-size:24px;font-weight:700;letter-spacing:3px;color:var(--cyan);text-transform:uppercase;line-height:1.4}

.cards{display:flex;flex-direction:column;gap:16px}
.card{display:flex;align-items:center;justify-content:space-between;text-decoration:none;background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:26px 24px;transition:all 0.18s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0.85}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card:active{transform:translateY(0)}
.card-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:1px}
.card-arrow{font-size:20px;color:var(--accent)}
</style>
</head>
<body>

<div id="wrap">

  <div class="brand">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#39d0ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 12l20-9-9 20-2-9-9-2z"/>
      </svg>
    </div>
    <h1>Fly for New Pride 2026</h1>
  </div>

  <div class="cards">
    <a class="card" href="sptg2026-stm-trainer.html" style="--accent:var(--purple)">
      <span class="card-title">Memory (STM)</span>
      <span class="card-arrow">&rarr;</span>
    </a>
    <a class="card" href="sptg2026-series-trainer.html" style="--accent:var(--cyan)">
      <span class="card-title">Series Number</span>
      <span class="card-arrow">&rarr;</span>
    </a>
    <a class="card" href="sptg2026-picture-trainer.html" style="--accent:var(--orange)">
      <span class="card-title">Series Picture</span>
      <span class="card-arrow">&rarr;</span>
    </a>
    <a class="card" href="sptg2026-math-trainer.html" style="--accent:var(--green)">
      <span class="card-title">Mental Math</span>
      <span class="card-arrow">&rarr;</span>
    </a>
  </div>

</div>

</body>
</html>
